<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services Pricing — Corner Ribbon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sage: #525252; --sage-light: #737373; --cream: #f5f5f5; --gold: #a3a3a3;
      --charcoal: #171717; --deep: #262626; --rich: #0a0a0a; --white: #ffffff;
      --font: "DM Sans", system-ui, sans-serif;
      --display: Georgia, "Times New Roman", serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; font-family: var(--font); background: var(--rich); color: var(--cream); }

    .sec { min-height: 100dvh; padding: 48px 20px 64px; background: var(--deep); }
    .sec-head { max-width: 560px; margin: 0 auto 32px; text-align: center; }
    .sec-head .eyebrow { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .sec-head h2 { font-family: var(--display); font-size: clamp(26px, 4vw, 38px); font-weight: 400; margin-bottom: 6px; }
    .sec-head p { font-size: 14px; color: var(--sage-light); line-height: 1.5; }

    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 960px; margin: 0 auto; align-items: stretch; }
    @media (max-width: 768px) { .grid-3 { grid-template-columns: 1fr; max-width: 340px; } }

    .book-btn {
      width: 100%; margin-top: auto; padding: 12px 16px; border: none; border-radius: 8px;
      font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
      background: #3d3d3d; color: var(--sage-light);
      transition: transform 0.15s, background 0.15s, color 0.15s;
    }
    .book-btn:hover { transform: translateY(-1px); background: #4a4a4a; color: var(--cream); }
    .card-hl.selected .book-btn {
      background: var(--cream); color: var(--charcoal);
    }
    .card-hl.selected .book-btn:hover { background: var(--white); }

    .check { list-style: none; font-size: 12px; color: var(--sage-light); line-height: 1.65; margin: 14px 0 18px; flex: 1; }
    .check li { padding: 3px 0 3px 18px; position: relative; }
    .check li::before { content: "✓"; position: absolute; left: 0; color: var(--gold); font-size: 11px; }

    .card-hl {
      background: var(--rich); border: 2px solid #333; border-radius: 16px;
      padding: 26px 20px; position: relative; overflow: hidden;
      display: flex; flex-direction: column; cursor: pointer;
      transition: border-color 0.25s, transform 0.25s, background 0.25s;
    }
    .card-hl.selected {
      border-color: var(--gold); background: #111;
      transform: scale(1.04); z-index: 2;
    }
    .card-hl h3 { font-size: 16px; font-weight: 600; }
    .card-hl .price-row { display: flex; align-items: baseline; gap: 4px; margin: 14px 0 6px; }
    .card-hl .price { font-size: 40px; font-weight: 700; }
    .card-hl .per { font-size: 13px; color: var(--sage-light); }
    .card-hl .dur { font-size: 12px; color: var(--sage-light); margin-bottom: 12px; }

    .card-hl .ribbon {
      position: absolute; top: 14px; right: -28px;
      background: var(--gold); color: var(--charcoal);
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 4px 32px; transform: rotate(45deg); pointer-events: none;
    }

    .toast {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-12px);
      background: var(--charcoal); color: var(--cream); padding: 12px 22px; border-radius: 8px;
      font-size: 13px; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <section class="sec">
    <div class="sec-head">
      <div class="eyebrow">Services</div>
      <h2>Choose your service.</h2>
      <p>Three tiers — one flat price. Premium is our most popular option.</p>
    </div>
    <div class="grid-3" id="grid"></div>
  </section>
  <div class="toast" id="toast"></div>

  <script>
    const TIERS = [
      { tier: 'Standard', pkg: 'Essential', price: 99, mins: 45, featured: false,
        items: ['Kitchen & baths detailed', 'Dust, vacuum, mop', 'Standard supplies included'] },
      { tier: 'Premium', pkg: 'Signature', price: 119, mins: 60, featured: true,
        items: ['Everything in Standard', 'Inside microwave & appliances', 'Priority scheduling'] },
      { tier: 'Complete', pkg: 'Deep', price: 139, mins: 90, featured: false,
        items: ['Everything in Premium', 'Baseboards & detail work', 'Extended on-site time'] },
    ];

    const toast = document.getElementById('toast');
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), 2600);
    }
    function demoBook(t) { showToast(`→ /book?pkg=${t.pkg}&size=s1 (${t.tier} · $${t.price})`); }
    function checks(items) { return `<ul class="check">${items.map(i => `<li>${i}</li>`).join('')}</ul>`; }
    function durLabel(m) { return `${m} min on site`; }

    const cards = [];
    const grid = document.getElementById('grid');

    function selectCard(tierName) {
      cards.forEach(({ el, tier }) => {
        el.classList.toggle('selected', tier.tier === tierName);
      });
    }

    TIERS.forEach(t => {
      const el = document.createElement('div');
      el.className = 'card-hl';
      el.dataset.tier = t.tier;
      el.innerHTML = `
        ${t.featured ? '<span class="ribbon">Popular</span>' : ''}
        <h3>${t.tier}</h3>
        <div class="price-row"><span class="price">$${t.price}</span><span class="per">/ visit</span></div>
        <div class="dur">${durLabel(t.mins)}</div>
        ${checks(t.items)}
        <button type="button" class="book-btn">Book Now</button>
      `;
      el.onclick = () => selectCard(t.tier);
      el.querySelector('.book-btn').onclick = e => {
        e.stopPropagation();
        demoBook(t);
      };
      cards.push({ el, tier: t });
      grid.appendChild(el);
    });

    selectCard('Premium');
  </script>
</body>
</html>
