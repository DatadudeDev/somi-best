# wrangler.toml — Cloudflare Pages bindings for DatadudeDev/somi-best (BEST Therapy).
# Per-client deploy of the somi-full-template website. Bindings are PINNED to this
# client's tenant resources so git-connected Pages deployments never reset them to
# template defaults (the prior bug: every push reverted DB/R2 to template and dropped
# the PAYMENTS binding + USE_CENTRAL_PAYMENTS).

name = "somi-best"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[limits]
cpu_ms = 5_000

# D1 — BEST's own tenant database (somi-db-00mqu4...), seeded with the booking/payments
# schema (customers, bookings, promo_codes, blocked_dates, settings, transactions)
# alongside the tenant operational tables.
[[d1_databases]]
binding = "DB"
database_name = "somi-db-00mqu4ornuynwbv8cm36kbh0zp"
database_id = "37256434-35bc-48f6-8002-3f2e63ef11be"
migrations_dir = "migrations"

# R2 — BEST's own tenant asset bucket.
[[r2_buckets]]
binding = "FILES"
bucket_name = "somi-assets-00mqu4ornuynwbv8cm36kbh0zp"

# Central payments — bind the platform somi-payments Worker. Booking endpoints call
# env.PAYMENTS (no per-client Stripe key) when USE_CENTRAL_PAYMENTS=true.
[[services]]
binding = "PAYMENTS"
service = "somi-payments"

[vars]
ENVIRONMENT = "production"
CURRENCY = "cad"
TIMEZONE = "America/Edmonton"
FROM_EMAIL = "bookings@somi.ceo"
BUSINESS_NAME = "BEST Therapy"
BUSINESS_NOTIFY_EMAIL = "stanierg@gmail.com"
REPLY_TO_EMAIL = "hello@treytherapy.com"
USE_CENTRAL_PAYMENTS = "true"
BOOKING_REQUIRES_ADDRESS = "false"
SITE_ORIGIN = "https://treytherapy.com"
EMAIL_LOGO_URL = "https://treytherapy.com/images/best/logo-wordmark.png"
EMAIL_LOCATION_LABEL = "Calgary, AB"
PLACE_ID = "ChIJE2UmPeB7cVMRIuvzfkwQuyg"
BUSINESS_PHONE = "+14033999154"
BUSINESS_CALL_LABEL = "Call BEST Therapy"

# ── Secrets (set via the Pages dashboard, never committed; persist across deploys) ──
#   CLIENT_USER_ID            Tenant ULID (00mqu4ornuynwbv8cm36kbh0zp)
#   INTERNAL_CALLBACK_SECRET  HMAC shared secret with somi-payments for booking callbacks
#   TURNSTILE_SECRET_KEY      Pairs with VITE_TURNSTILE_SITE_KEY in .env.production
# Frontend build vars (Vite — NOT wrangler [vars]; see .env.production):
#   VITE_USE_BOOKING_API=true Switches the booking form off mock data
#   VITE_TURNSTILE_SITE_KEY   Public Turnstile site key (browser widget)
